[pytest]
minversion = 7.0
testpaths = tests
python_files = test_reg_*.py
addopts = -ra -m "smoke or core or cli"
markers =
    smoke: Fast, deterministic sanity checks for daily refactor loops.
    core: Pipeline core behavior tests (DAG, caching, planning, invalidation).
    cli: CLI argument and orchestration behavior tests.
    artifact: Artifact spill/load and storage-format behavior tests.
    integration: Cross-module behavior tests requiring multiple components.
    full_matrix: Optional dependency and format matrix tests.
    slow: Expensive tests excluded from default loops.
